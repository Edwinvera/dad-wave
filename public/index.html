<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dad Wave v1</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; }
    input, select, textarea { padding: 6px; margin-right: 6px; margin-bottom: 6px; }
    button { padding: 6px 12px; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { text-align: left; padding: 8px; border-bottom: 1px solid #ddd; }
    th { background: #f4f4f4; }
    section { margin-bottom: 40px; }
    h2 { border-bottom: 2px solid #333; padding-bottom: 6px; }
    .recommendation { background: #f0f7ff; border-left: 4px solid #0066cc; padding: 10px 14px; margin-top: 10px; border-radius: 4px; }
    .form-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 8px; }
    .increment-note { font-size: 0.85em; color: #666; margin-left: 4px; }
    .success { background: #f0fff4; border-left: 4px solid #00aa44; padding: 10px 14px; border-radius: 4px; margin-top: 10px; }
    .nav { display: flex; gap: 12px; margin-bottom: 30px; }
    .nav button { padding: 10px 20px; font-size: 1em; }
    .nav button.active { background: #333; color: white; }
    .page { display: none; }
    .page.active { display: block; }
  </style>
</head>
<body>
  <h1>Dad Wave v1</h1>

  <!-- Navigation -->
  <div class="nav">
    <button class="active" onclick="showPage('tracker')">Session Tracker</button>
    <button onclick="showPage('profile')">My Profile</button>
  </div>

  <!-- Tracker Page -->
  <div id="page-tracker" class="page active">

    <!-- Add Exercise -->
    <section>
      <h2>Add Exercise</h2>
      <div class="form-row">
        <input type="text" id="name" placeholder="Exercise name" />
        <select id="equipment">
          <option value="">-- Equipment --</option>
          <option value="Barbell">Barbell</option>
          <option value="Dumbbell">Dumbbell</option>
          <option value="Machine">Machine</option>
          <option value="Cable">Cable</option>
          <option value="Bodyweight">Bodyweight</option>
          <option value="Other">Other</option>
        </select>
        <select id="exercise_type" onchange="autoFillIncrement()">
          <option value="">-- Type --</option>
          <option value="Compound">Compound</option>
          <option value="Isolation">Isolation</option>
        </select>
      </div>
      <div class="form-row">
        <input type="number" id="rep_min" placeholder="Rep min" style="width:80px" />
        <input type="number" id="rep_max" placeholder="Rep max" style="width:80px" />
        <input type="number" id="weight_increment" placeholder="Increment" style="width:120px" />
        <span class="increment-note">Auto-filled by type, override if needed</span>
      </div>
      <button onclick="addExercise()">Add Exercise</button>
    </section>

    <!-- Log a Session -->
    <section>
      <h2>Log a Session</h2>
      <div class="form-row">
        <select id="session_exercise" onchange="loadRecommendation()">
          <option value="">-- Select Exercise --</option>
        </select>
        <input type="number" id="session_weight" placeholder="Weight" style="width:100px" />
        <input type="number" id="session_reps" placeholder="Reps" style="width:80px" />
        <input type="text" id="session_notes" placeholder="Notes (optional)" style="width:150px" />
      </div>
      <div id="recommendation-box" style="display:none" class="recommendation"></div>
      <br/>
      <button onclick="logSession()">Log Set</button>
    </section>

    <!-- Exercise List -->
    <section>
      <h2>Exercises</h2>
      <table>
        <thead>
          <tr>
            <th>Exercise</th>
            <th>Equipment</th>
            <th>Type</th>
            <th>Rep Range</th>
            <th>Increment</th>
          </tr>
        </thead>
        <tbody id="exercise-list"></tbody>
      </table>
    </section>

    <!-- Session History -->
    <section>
      <h2>Session History</h2>
      <select id="history_exercise" onchange="loadSessions()">
        <option value="">-- Select Exercise --</option>
      </select>
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Weight</th>
            <th>Reps</th>
            <th>Notes</th>
          </tr>
        </thead>
        <tbody id="session-list"></tbody>
      </table>
    </section>

  </div>

  <!-- Profile Page -->
  <div id="page-profile" class="page">

<section>
      <h2>My Profile</h2>
      <div class="form-row">
        <input type="text" id="profile_first_name" placeholder="First name" />
        <input type="text" id="profile_last_name" placeholder="Last name" />
        <input type="number" id="profile_age" placeholder="Age" style="width:80px" />
      </div>
      <div class="form-row">
        <select id="profile_sex">
          <option value="">-- Sex --</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Other">Other</option>
        </select>
        <select id="profile_unit" onchange="updateUnitLabels()">
          <option value="lbs">lbs</option>
          <option value="kg">kg</option>
        </select>
      </div>
      <div class="form-row">
        <input type="number" id="profile_bodyweight" placeholder="Bodyweight" style="width:130px" />
        <span id="profile_unit_label" class="increment-note">lbs</span>
      </div>
      <button onclick="saveProfile()">Save Profile</button>
      <div id="profile-success" style="display:none" class="success">Profile saved!</div>
    </section>

    <section>
      <h2>Bodyweight History</h2>
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Bodyweight</th>
          </tr>
        </thead>
        <tbody id="bodyweight-history"></tbody>
      </table>
    </section>

  </div>

  <script>
    let currentUnit = 'lbs';

    // Page navigation
    function showPage(page) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
      document.getElementById('page-' + page).classList.add('active');
      event.target.classList.add('active');
      if (page === 'profile') loadProfile();
    }

    // Update unit labels when unit changes
    function updateUnitLabels() {
      currentUnit = document.getElementById('profile_unit').value;
      document.getElementById('profile_unit_label').textContent = currentUnit;
    }

    // Load profile
    function loadProfile() {
      fetch('/api/profile')
        .then(res => res.json())
        .then(data => {
          if (!data) return;
          document.getElementById('profile_first_name').value = data.first_name || '';
          document.getElementById('profile_last_name').value = data.last_name || '';
          document.getElementById('profile_age').value = data.age || '';
          document.getElementById('profile_sex').value = data.sex || '';
          document.getElementById('profile_unit').value = data.preferred_unit || 'lbs';
          document.getElementById('profile_bodyweight').value = data.current_bodyweight || '';
          currentUnit = data.preferred_unit || 'lbs';
          updateUnitLabels();
          loadBodyweightHistory();
        });
    }

    // Save profile
    function saveProfile() {
      const first_name = document.getElementById('profile_first_name').value.trim();
      const last_name = document.getElementById('profile_last_name').value.trim();
      const age = parseInt(document.getElementById('profile_age').value);
      const sex = document.getElementById('profile_sex').value;
      const preferred_unit = document.getElementById('profile_unit').value;
      const bodyweight = parseFloat(document.getElementById('profile_bodyweight').value);

      if (!first_name || !last_name || !age || !sex || !bodyweight) {
        alert('Please fill in all fields');
        return;
      }

      fetch('/api/profile', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ first_name, last_name, age, sex, preferred_unit, bodyweight })
      })
        .then(res => res.json())
        .then(() => {
          const box = document.getElementById('profile-success');
          box.style.display = 'block';
          setTimeout(() => box.style.display = 'none', 3000);
          loadBodyweightHistory();
        });
    }

    // Load bodyweight history
    function loadBodyweightHistory() {
      fetch('/api/profile/bodyweight-history')
        .then(res => res.json())
        .then(data => {
          const tbody = document.getElementById('bodyweight-history');
          tbody.innerHTML = '';
          data.forEach(entry => {
            const row = document.createElement('tr');
            row.innerHTML = `
              <td>${new Date(entry.recorded_at).toLocaleDateString()}</td>
              <td>${entry.bodyweight} ${currentUnit}</td>
            `;
            tbody.appendChild(row);
          });
        });
    }

    // Auto fill increment based on exercise type
    function autoFillIncrement() {
      const type = document.getElementById('exercise_type').value;
      const incrementInput = document.getElementById('weight_increment');
      if (type === 'Compound') incrementInput.value = 10;
      else if (type === 'Isolation') incrementInput.value = 5;
      else incrementInput.value = '';
    }

    // Load exercises into table and dropdowns
    function loadExercises() {
      fetch('/api/exercises')
        .then(res => res.json())
        .then(data => {
          const tbody = document.getElementById('exercise-list');
          tbody.innerHTML = '';

          const sessionSelect = document.getElementById('session_exercise');
          const historySelect = document.getElementById('history_exercise');
          sessionSelect.innerHTML = '<option value="">-- Select Exercise --</option>';
          historySelect.innerHTML = '<option value="">-- Select Exercise --</option>';

          data.forEach(ex => {
            const row = document.createElement('tr');
            row.innerHTML = `
              <td>${ex.name}</td>
              <td>${ex.equipment}</td>
              <td>${ex.exercise_type}</td>
              <td>${ex.rep_range_min} - ${ex.rep_range_max}</td>
              <td>${ex.weight_increment} lbs</td>
            `;
            tbody.appendChild(row);

            sessionSelect.appendChild(new Option(ex.name, ex.id));
            historySelect.appendChild(new Option(ex.name, ex.id));
          });
        });
    }

    // Add a new exercise
    function addExercise() {
      const name = document.getElementById('name').value.trim();
      const equipment = document.getElementById('equipment').value;
      const exercise_type = document.getElementById('exercise_type').value;
      const rep_range_min = parseInt(document.getElementById('rep_min').value);
      const rep_range_max = parseInt(document.getElementById('rep_max').value);
      const weight_increment = parseFloat(document.getElementById('weight_increment').value);

      if (!name || !equipment || !exercise_type || !rep_range_min || !rep_range_max || !weight_increment) {
        alert('Please fill in all fields');
        return;
      }

      fetch('/api/exercises', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, equipment, exercise_type, rep_range_min, rep_range_max, weight_increment })
      })
        .then(res => res.json())
        .then(() => {
          document.getElementById('name').value = '';
          document.getElementById('equipment').value = '';
          document.getElementById('exercise_type').value = '';
          document.getElementById('rep_min').value = '';
          document.getElementById('rep_max').value = '';
          document.getElementById('weight_increment').value = '';
          loadExercises();
        });
    }

    // Load recommendation when exercise selected
    function loadRecommendation() {
      const exercise_id = document.getElementById('session_exercise').value;
      const box = document.getElementById('recommendation-box');

      if (!exercise_id) {
        box.style.display = 'none';
        return;
      }

      fetch(`/api/recommendation/${exercise_id}`)
        .then(res => res.json())
        .then(data => {
          if (!data.lastSession) {
            box.style.display = 'none';
            return;
          }
          box.style.display = 'block';
          box.innerHTML = `<strong>Recommendation:</strong> ${data.message}<br>
            <small>Last session: ${data.lastSession.weight} lbs x ${data.lastSession.reps} reps</small>`;
          document.getElementById('session_weight').value = data.recommendedWeight;
        });
    }

    // Log a session
    function logSession() {
      const exercise_id = parseInt(document.getElementById('session_exercise').value);
      const weight = parseFloat(document.getElementById('session_weight').value);
      const reps = parseInt(document.getElementById('session_reps').value);
      const notes = document.getElementById('session_notes').value.trim();

      if (!exercise_id || !weight || !reps) {
        alert('Please select an exercise and enter weight and reps');
        return;
      }

      fetch('/api/sessions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ exercise_id, weight, reps, notes })
      })
        .then(res => res.json())
        .then(() => {
          document.getElementById('session_weight').value = '';
          document.getElementById('session_reps').value = '';
          document.getElementById('session_notes').value = '';
          document.getElementById('recommendation-box').style.display = 'none';
          document.getElementById('session_exercise').value = '';
          const historySelect = document.getElementById('history_exercise');
          if (parseInt(historySelect.value) === exercise_id) loadSessions();
        });
    }

    // Load session history
    function loadSessions() {
      const exercise_id = document.getElementById('history_exercise').value;
      if (!exercise_id) return;

      fetch(`/api/sessions/${exercise_id}`)
        .then(res => res.json())
        .then(data => {
          const tbody = document.getElementById('session-list');
          tbody.innerHTML = '';
          data.forEach(s => {
            const row = document.createElement('tr');
            row.innerHTML = `
              <td>${new Date(s.performed_at).toLocaleDateString()}</td>
              <td>${s.weight} lbs</td>
              <td>${s.reps}</td>
              <td>${s.notes || '-'}</td>
            `;
            tbody.appendChild(row);
          });
        });
    }

    loadExercises();
    loadProfile();
  </script>
</body>
</html>
