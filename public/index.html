<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dad Wave</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; }
    nav { margin-bottom: 30px; display: flex; gap: 12px; }
    nav a { text-decoration: none; color: #0066cc; font-weight: bold; }
    nav a:hover { text-decoration: underline; }
    .welcome { font-size: 1.2em; margin-bottom: 30px; }
    .cards { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 40px; }
    .card { flex: 1; min-width: 150px; background: #f4f4f4; border-radius: 8px; padding: 20px; text-align: center; }
    .card h3 { margin: 0 0 8px 0; font-size: 0.9em; color: #666; text-transform: uppercase; }
    .card p { margin: 0; font-size: 2em; font-weight: bold; }
    .quick-links { display: flex; gap: 16px; flex-wrap: wrap; }
    .quick-links a { display: block; padding: 14px 24px; background: #333; color: white; border-radius: 6px; text-decoration: none; font-weight: bold; }
    .quick-links a:hover { background: #555; }
    h2 { border-bottom: 2px solid #333; padding-bottom: 6px; }
  </style>
</head>
<body>
  <h1>Dad Wave</h1>

  <nav>
    <a href="/">Dashboard</a>
    <a href="/exercises.html">Exercises</a>
    <a href="/sessions.html">Sessions</a>
    <a href="/profile.html">Profile</a>
  </nav>

  <p class="welcome" id="welcome-msg">Welcome back!</p>

  <h2>Quick Stats</h2>
  <div class="cards">
    <div class="card">
      <h3>Total Sessions</h3>
      <p id="stat-sessions">-</p>
    </div>
    <div class="card">
      <h3>Total Volume</h3>
      <p id="stat-volume">-</p>
    </div>
    <div class="card">
      <h3>Last Session</h3>
      <p id="stat-last" style="font-size:1em">-</p>
    </div>
  </div>

  <h2>Quick Links</h2>
  <div class="quick-links">
    <a href="/exercises.html">Manage Exercises</a>
    <a href="/sessions.html">Log a Session</a>
    <a href="/profile.html">My Profile</a>
  </div>

  <script src="/js/shared.js"></script>
  <script>
    // Load welcome message from profile
    getProfile().then(data => {
      if (data && data.first_name) {
        document.getElementById('welcome-msg').textContent = `Welcome back, ${data.first_name}!`;
      }
    });

    // Load quick stats
    fetch('/api/stats/summary')
      .then(res => res.json())
      .then(data => {
        document.getElementById('stat-sessions').textContent = data.total_sessions;
        document.getElementById('stat-volume').textContent = data.total_volume.toLocaleString() + ' lbs';
        document.getElementById('stat-last').textContent = data.last_session ? formatDate(data.last_session) : 'None yet';
      });
  </script>
</body>
</html>
