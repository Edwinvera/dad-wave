<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="/css/shared.css">
  <title>Dad Wave - Settings</title>
  <style>
  .container { max-width: 600px; margin: 0 auto; padding: 32px 24px; }
  h1 { font-size: 1.6em; margin-bottom: 24px; }

  .card h2 {
    font-size: 1em;
    color: #555;
    margin-bottom: 18px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 600;
  }

  .setting-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 0;
    border-bottom: 1px solid #f0f0f0;
  }
  .setting-row:last-child { border-bottom: none; }
  .setting-label { font-size: 0.95em; font-weight: 500; }
  .setting-desc { font-size: 0.8em; color: #888; margin-top: 3px; }

  .toggle {
    position: relative;
    width: 44px;
    height: 24px;
    flex-shrink: 0;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute;
    inset: 0;
    background: #ddd;
    border-radius: 24px;
    cursor: pointer;
    transition: 0.2s;
  }
  .toggle-slider:before {
    content: '';
    position: absolute;
    width: 18px;
    height: 18px;
    left: 3px;
    top: 3px;
    background: white;
    border-radius: 50%;
    transition: 0.2s;
  }
  .toggle input:checked + .toggle-slider { background: #1a1a1a; }
  .toggle input:checked + .toggle-slider:before { transform: translateX(20px); }

  .setting-select {
    padding: 7px 12px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 0.88em;
    background: white;
    cursor: pointer;
  }
  .setting-select:focus { outline: none; border-color: #1a1a1a; }

  .save-row { margin-top: 20px; }
  .success-msg { display: none; color: #00aa44; font-size: 0.85em; margin-top: 10px; }
</style>
</head>
<body>

  <nav class="nav">
    <span class="logo">Dad Wave</span>
    <a href="/index.html">History</a>
    <a href="/exercises.html">Exercises</a>
    <a href="/profile.html">Profile</a>
    <a href="/settings.html" class="active">Settings</a>
  </nav>

  <div class="container">
    <h1>Settings</h1>

    <!-- Display -->
    <div class="card">
      <h2>Display</h2>

      <div class="setting-row">
        <div>
          <div class="setting-label">Dark Mode</div>
          <div class="setting-desc">Switch between light and dark theme</div>
        </div>
        <label class="toggle">
          <input type="checkbox" id="dark-mode-toggle" onchange="toggleTheme()" />
          <span class="toggle-slider"></span>
        </label>
      </div>

      <div class="setting-row">
        <div>
          <div class="setting-label">Weight Unit</div>
          <div class="setting-desc">Used across all sessions and recommendations</div>
        </div>
        <select class="setting-select" id="unit-select">
          <option value="lbs">lbs</option>
          <option value="kg">kg</option>
        </select>
      </div>
    </div>

    <!-- 1RM Settings -->
    <div class="card">
      <h2>1RM Calculation</h2>

      <div class="setting-row">
        <div>
          <div class="setting-label">Formula</div>
          <div class="setting-desc">Method used to estimate your one rep max</div>
        </div>
        <select class="setting-select" id="orm-formula">
          <option value="epley">Epley</option>
          <option value="brzycki">Brzycki</option>
          <option value="mentzner">Mentzer</option>
        </select>
      </div>
    </div>

    <div class="save-row">
      <button class="btn btn-primary" onclick="saveSettings()">Save Settings</button>
      <div class="success-msg" id="success-msg">✓ Settings saved</div>
    </div>

  </div>

  <script src="/js/shared.js"></script>
  <script>
    async function loadSettings() {
        const data = await getProfile();
        if (!data) return;
        document.getElementById('unit-select').value = data.preferred_unit || 'lbs';
        const isDark = data.theme === 'dark';
        document.getElementById('dark-mode-toggle').checked = isDark;
        }

    function toggleTheme() {
        const isDark = document.getElementById('dark-mode-toggle').checked;
        applyTheme(isDark ? 'dark' : 'light');
        }

    async function saveSettings() {
        const preferred_unit = document.getElementById('unit-select').value;
        const theme = document.getElementById('dark-mode-toggle').checked ? 'dark' : 'light';

    await fetch('/api/settings', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ preferred_unit, theme })
        });

    applyTheme(theme);

    const msg = document.getElementById('success-msg');
        msg.style.display = 'block';
        setTimeout(() => msg.style.display = 'none', 3000);
        }

    loadSettings();
  </script>
</body>
</html>
