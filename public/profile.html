<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="/css/shared.css">
  <title>Dad Wave - Profile</title>
  <style>
  .container { max-width: 600px; margin: 0 auto; padding: 32px 24px; }
  h1 { font-size: 1.6em; margin-bottom: 24px; }

  .card h2 {
    font-size: 1em;
    color: #555;
    margin-bottom: 18px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 600;
  }

  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 0.85em; color: #666; margin-bottom: 5px; }
  .field input, .field select { width: 100%; }
  .field-row { display: flex; gap: 12px; }
  .field-row .field { flex: 1; }

  .success-msg { display: none; color: #00aa44; font-size: 0.85em; margin-top: 10px; }

  .bw-entry {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #f0f0f0;
    font-size: 0.9em;
  }
  .bw-entry:last-child { border-bottom: none; }
  .bw-date { color: #888; font-size: 0.85em; }
  .bw-weight { font-weight: 600; }
  .empty-state { color: #bbb; font-size: 0.85em; text-align: center; padding: 20px 0; }
</style>
</head>
<body>

  <nav class="nav">
    <span class="logo">Dad Wave</span>
    <a href="/index.html">History</a>
    <a href="/exercises.html">Exercises</a>
    <a href="/profile.html" class="active">Profile</a>
    <a href="/settings.html">Settings</a>
  </nav>

  <div class="container">
    <h1>Profile</h1>

    <!-- Personal Info -->
    <div class="card">
      <h2>Personal Info</h2>
      <div class="field-row">
        <div class="field">
          <label>First Name</label>
          <input type="text" id="first_name" placeholder="First name" />
        </div>
        <div class="field">
          <label>Last Name</label>
          <input type="text" id="last_name" placeholder="Last name" />
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Age</label>
          <input type="number" id="age" placeholder="Age" />
        </div>
        <div class="field">
          <label>Sex</label>
          <select id="sex">
            <option value="">-- Select --</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Bodyweight</label>
          <input type="number" id="bodyweight" placeholder="e.g. 185" step="0.1" />
        </div>
        <div class="field">
          <label>Unit</label>
          <select id="preferred_unit">
            <option value="lbs">lbs</option>
            <option value="kg">kg</option>
          </select>
        </div>
      </div>
      <button class="btn btn-primary" onclick="saveProfile()">Save Profile</button>
      <div class="success-msg" id="success-msg">✓ Profile saved successfully</div>
    </div>

    <!-- Bodyweight History -->
    <div class="card">
      <h2>Bodyweight History</h2>
      <div id="bw-history"></div>
    </div>

  </div>

  <script src="/js/shared.js"></script>
  <script>
    let currentUnit = 'lbs';

    async function loadProfile() {
      const data = await getProfile();
      if (!data) return;

      document.getElementById('first_name').value = data.first_name || '';
      document.getElementById('last_name').value = data.last_name || '';
      document.getElementById('age').value = data.age || '';
      document.getElementById('sex').value = data.sex || '';
      document.getElementById('bodyweight').value = data.current_bodyweight || '';
      document.getElementById('preferred_unit').value = data.preferred_unit || 'lbs';
      currentUnit = data.preferred_unit || 'lbs';

      loadBodyweightHistory();
    }

    async function saveProfile() {
      const first_name = document.getElementById('first_name').value.trim();
      const last_name = document.getElementById('last_name').value.trim();
      const age = parseInt(document.getElementById('age').value);
      const sex = document.getElementById('sex').value;
      const preferred_unit = document.getElementById('preferred_unit').value;
      const bodyweight = parseFloat(document.getElementById('bodyweight').value);

      if (!first_name || !last_name || !age || !sex || !bodyweight) {
        alert('Please fill in all fields');
        return;
      }

      await fetch('/api/profile', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ first_name, last_name, age, sex, preferred_unit, bodyweight })
      });

      const msg = document.getElementById('success-msg');
      msg.style.display = 'block';
      setTimeout(() => msg.style.display = 'none', 3000);
      currentUnit = preferred_unit;
      loadBodyweightHistory();
    }

    async function loadBodyweightHistory() {
      const res = await fetch('/api/profile/bodyweight-history');
      const data = await res.json();
      const container = document.getElementById('bw-history');

      if (data.length === 0) {
        container.innerHTML = '<div class="empty-state">No bodyweight entries yet</div>';
        return;
      }

      container.innerHTML = '';
      data.forEach(entry => {
        const div = document.createElement('div');
        div.className = 'bw-entry';
        div.innerHTML = `
          <span class="bw-date">${formatDate(entry.recorded_at)}</span>
          <span class="bw-weight">${entry.bodyweight} ${currentUnit}</span>
        `;
        container.appendChild(div);
      });
    }

    loadProfile();
  </script>
</body>
</html>
